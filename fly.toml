app = "synapse-app"
primary_region = "sjc"

[build]
  dockerfile = "./Dockerfile"

[env]
  JWT_SECRET_KEY = "production-secret-key-change-this"
  DATABASE_URL = "postgresql://user:pass@localhost/synapse"
  CORS_ORIGINS = "https://synapse-app.fly.dev,http://localhost:5173"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
