services:
  - type: web
    name: synapse-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: .
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: synapse-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://synapse-health.vercel.app,http://localhost:5173"
    healthCheckPath: /api/v1/health

databases:
  - name: synapse-db
    databaseName: synapse
    user: synapse
    plan: free
